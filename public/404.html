<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;background:linear-gradient(160deg,#050D2E,#0A1A4E);font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;color:#fff;text-align:center;}
  h1{font-family:'Cinzel',serif;font-size:100px;font-weight:900;color:#F5A623;line-height:1;}
  p{color:rgba(255,255,255,0.5);margin:12px 0 32px;font-size:16px;}
  a{padding:14px 32px;background:linear-gradient(135deg,#C77B00,#F5A623);border-radius:12px;color:#0A1A4E;font-weight:800;text-decoration:none;font-family:'Cinzel',serif;letter-spacing:1px;}

  @media (max-width: 640px) {
    h1{font-size:64px;}
    p{font-size:14px;}
    a{padding:12px 24px;}
    body{padding:16px;}
  }
</style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>This page doesn't exist or you don't have access.</p>
    <a href="/">← Go Home</a>
  </div>
</body>
</html>
