<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — AKR Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5A623; --gold-light: #FFD166; --gold-dark: #C77B00;
    --navy: #0A1A4E; --navy-light: #1A2F7A; --blue: #1B4FD8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(160deg, #030a1e 0%, #0A1A4E 50%, #0d1b5e 100%);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .grid-bg {
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(245,166,35,0.04) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(245,166,35,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0;
  }

  .card {
    position: relative; z-index: 10;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 24px;
    padding: 52px 48px;
    width: 440px;
    max-width: 95vw;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: enter 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes enter {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: none; }
  }

  .logo {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-mark {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    object-fit: cover;
    margin: 0 auto 14px;
    box-shadow: 0 0 30px rgba(245,166,35,0.3);
    animation: pulse 3s ease infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 30px rgba(245,166,35,0.3); }
    50% { box-shadow: 0 0 50px rgba(245,166,35,0.6); }
  }

  .logo-name {
    font-family: 'Cinzel', serif;
    font-size: 13px; font-weight: 700;
    letter-spacing: 3px;
    color: var(--gold);
    opacity: 0.9;
  }

  .logo-sub {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1.5px;
    margin-top: 3px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: 22px; font-weight: 900;
    color: #fff;
    text-align: center;
    margin-bottom: 6px;
  }

  .subtitle {
    text-align: center;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    font-weight: 600;
    margin-bottom: 36px;
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 10px; font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 15px 18px;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(245,166,35,0.2);
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 600;
    color: #fff;
    outline: none;
    transition: all 0.3s;
  }

  input:focus {
    border-color: var(--gold);
    background: rgba(245,166,35,0.06);
    box-shadow: 0 0 20px rgba(245,166,35,0.15);
  }

  input::placeholder { color: rgba(255,255,255,0.2); }

  .btn {
    width: 100%;
    padding: 17px;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
    border: none;
    border-radius: 12px;
    font-family: 'Cinzel', serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: 2px;
    color: var(--navy);
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 6px 20px rgba(245,166,35,0.3);
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute; top:-50%; left:-50%;
    width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: 0.5s;
  }

  .btn:hover::before { transform: translateX(100%); }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(245,166,35,0.5); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .error {
    text-align: center;
    padding: 12px;
    border-radius: 10px;
    background: rgba(255,107,107,0.12);
    border: 1px solid rgba(255,107,107,0.3);
    color: #FF8080;
    font-size: 13px; font-weight: 700;
    margin-top: 14px;
    display: none;
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}
  }

  .spinner {
    display:inline-block; width:16px; height:16px;
    border:2px solid rgba(10,26,78,0.3); border-top-color:var(--navy);
    border-radius:50%; animation:spin 0.8s linear infinite; vertical-align:middle;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  @media (max-width: 700px) {
    body { padding: 16px; }
    .card { padding: 36px 28px; max-width: 100%; }
    .logo-mark { width: 70px; height: 70px; }
    h1 { font-size: 20px; }
    .subtitle { font-size: 12px; }
    .field { margin-bottom: 16px; }
  }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .logo-mark { width: 62px; height: 62px; }
    .btn { padding: 15px; }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="card">
  <div class="logo">
    <img class="logo-mark" src="https://panel.rathamcloud.xyz/extensions/resourcemanager/uploads/1775581335_images (1).jpg" alt="AKR Academy School Logo">
    <div class="logo-name">AKR ACADEMY SCHOOL</div>
    <div class="logo-sub">ADMINISTRATION PORTAL</div>
  </div>

  <h1>Admin Access</h1>
  <p class="subtitle">Authorized personnel only</p>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username">
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
  </div>

  <button class="btn" id="login-btn" onclick="doLogin()">SIGN IN</button>
  <div class="error" id="error-msg"></div>
</div>

<script>
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!username || !password) return showError('Please enter credentials');

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';

  try {
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.success) {
      btn.innerHTML = '✓ Access Granted';
      btn.style.background = 'linear-gradient(135deg,#27AE60,#2ECC71)';
      setTimeout(() => window.location.href = data.redirect, 600);
    } else {
      showError(data.message || 'Invalid credentials');
      btn.disabled = false;
      btn.innerHTML = 'SIGN IN';
    }
  } catch (e) {
    showError('Connection error');
    btn.disabled = false;
    btn.innerHTML = 'SIGN IN';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.animation = 'none';
  setTimeout(() => el.style.animation = 'shake 0.4s ease', 10);
}
</script>
</body>
</html>
